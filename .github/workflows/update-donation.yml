name: Update Donation Data

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Scrape pump.fun coin page for donation data
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const CA = 'HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump';
          const URL = `https://pump.fun/coin/${CA}`;

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });
            const page = await context.newPage();

            try {
              await page.goto(URL, { waitUntil: 'networkidle', timeout: 30000 });
              await page.waitForTimeout(3000);

              console.log('Page title:', await page.title());
              console.log('Page URL:', page.url());

              const content = await page.content();
              console.log('Content length:', content.length);

              let donated = 0;

              // Primary: match "Donated X SOL ($15,810.84)" pattern
              const dollarMatch = content.match(/Donated[\s\S]{0,50}\(\$([\d,]+(?:\.\d{2})?)\)/i);
              if (dollarMatch) {
                donated = parseFloat(dollarMatch[1].replace(/,/g, ''));
                console.log('Found dollar amount:', donated);
              } else {
                // Fallback: find SOL amount and use it (need SOL price to convert)
                const solMatch = content.match(/Donated\s+([\d.]+)\s+SOL/i);
                if (solMatch) {
                  console.log('Found SOL amount:', solMatch[1], '— no dollar conversion available');
                } else {
                  console.log('No donation pattern found');
                  console.log('Content preview:', content.slice(0, 2000));
                }
              }

              const result = {
                donated,
                totalRaised: donated,
                source: 'pump.fun',
                fetchedAt: new Date().toISOString(),
              };

              fs.writeFileSync('public/donation.json', JSON.stringify(result));
              console.log('Wrote:', result);
            } catch (err) {
              console.error('Scrape failed:', err.message);
              process.exit(0);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/donation.json
          if git diff --cached --quiet; then
            echo "No change in donation data"
          else
            git commit -m "chore: update donation data [skip ci]"
            git push
          fi
