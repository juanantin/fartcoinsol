name: Update Donation Data

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch on-chain donation data
        run: |
          node - <<'EOF'
          const fs = require('fs');

          const MINT = 'HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump';
          const FEE_PROGRAM = 'pfeeUxB6jkeY1Hxd7CsFCAjcbHA9rWtchMGdZ6VojVZ';
          // base58 of DonationFeePda discriminator [246,197,96,9,193,30,93,115]
          const DISC_B58 = 'iGzHuqTccwt';

          const RPC_ENDPOINTS = [
            'https://rpc.ankr.com/solana',
            'https://api.mainnet-beta.solana.com',
          ];

          async function rpc(endpoint, method, params) {
            const res = await fetch(endpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ jsonrpc: '2.0', id: 1, method, params }),
            });
            return res.json();
          }

          async function getDonatedSOL() {
            for (const endpoint of RPC_ENDPOINTS) {
              console.log('Trying RPC:', endpoint);
              try {
                const data = await rpc(endpoint, 'getProgramAccounts', [
                  FEE_PROGRAM,
                  {
                    encoding: 'base64',
                    filters: [
                      { memcmp: { offset: 0, bytes: DISC_B58 } },
                      { memcmp: { offset: 42, bytes: MINT } },
                    ],
                  },
                ]);
                if (data.error) { console.log('RPC error:', JSON.stringify(data.error)); continue; }
                console.log('Accounts found:', data.result?.length ?? 0);
                let totalLamports = BigInt(0);
                for (const { account } of data.result ?? []) {
                  const buf = Buffer.from(account.data[0], 'base64');
                  if (buf.length >= 146) {
                    const donated = buf.readBigUInt64LE(138);
                    console.log('  account donated lamports:', donated.toString());
                    totalLamports += donated;
                  }
                }
                return Number(totalLamports) / 1e9;
              } catch (e) {
                console.log('Error:', e.message);
              }
            }
            return null;
          }

          async function getSolPrice() {
            try {
              const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=solana&vs_currencies=usd');
              const json = await res.json();
              console.log('SOL price (coingecko):', json?.solana?.usd);
              return json?.solana?.usd ?? null;
            } catch {}
            try {
              const res = await fetch('https://price.jup.ag/v6/price?ids=So11111111111111111111111111111111111111112');
              const json = await res.json();
              const price = json?.data?.['So11111111111111111111111111111111111111112']?.price ?? null;
              console.log('SOL price (jupiter):', price);
              return price;
            } catch {}
            return null;
          }

          (async () => {
            const [solDonated, solPrice] = await Promise.all([getDonatedSOL(), getSolPrice()]);
            console.log('solDonated:', solDonated, 'solPrice:', solPrice);

            if (solDonated !== null && solPrice) {
              const donated = solDonated * solPrice;
              const result = { donated, solDonated, solPrice, source: 'solana-rpc', fetchedAt: new Date().toISOString() };
              fs.writeFileSync('public/donation.json', JSON.stringify(result));
              console.log('Wrote:', result);
            } else {
              console.log('Could not get data — keeping existing file');
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/donation.json
          if git diff --cached --quiet; then
            echo "No change"
          else
            git commit -m "chore: update donation data [skip ci]"
            git push
          fi
