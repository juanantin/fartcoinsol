name: Update Donation Data

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Try pump.fun API directly
        run: |
          CA="HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump"
          DONATED=0

          echo "=== Trying frontend-api.pump.fun ==="
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -H "Origin: https://pump.fun" \
            -H "Referer: https://pump.fun/" \
            "https://frontend-api.pump.fun/coins/$CA")
          STATUS=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v "HTTP_STATUS:")
          echo "Status: $STATUS"
          echo "Body: ${BODY:0:500}"

          if [ "$STATUS" = "200" ]; then
            # Extract donation_usd or similar field
            DONATED=$(echo "$BODY" | python3 -c "
          import sys, json, re
          try:
            d = json.load(sys.stdin)
            keys = list(d.keys())
            print('Keys:', keys, file=sys.stderr)
            for k in ['donation_usd','donated_usd','total_donation','charity_usd','creator_fee_usd']:
              if k in d and d[k]:
                print(d[k])
                exit()
            # Look for any key with 'donat' or 'charit'
            for k,v in d.items():
              if ('donat' in k.lower() or 'charit' in k.lower()) and v:
                print(v)
                exit()
            print(0)
          except Exception as e:
            print(0)
            print('parse error:', e, file=sys.stderr)
          " 2>&1)
            echo "Donated: $DONATED"
          fi

          echo "=== Trying client-api herokuapp ==="
          RESP2=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept: application/json" \
            "https://client-api-2-74b1891ee9f9.herokuapp.com/coins/$CA")
          STATUS2=$(echo "$RESP2" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY2=$(echo "$RESP2" | grep -v "HTTP_STATUS:")
          echo "Status: $STATUS2"
          echo "Body: ${BODY2:0:500}"

      - name: Install Playwright and scrape pump.fun
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Scrape pump.fun coin page
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const CA = 'HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });

            // Capture ALL API responses from pump.fun
            const captured = [];
            context.on('response', async (response) => {
              const url = response.url();
              if (!url.includes('pump.fun')) return;
              try {
                const ct = response.headers()['content-type'] || '';
                if (ct.includes('json')) {
                  const json = await response.json();
                  captured.push({ url, json });
                }
              } catch {}
            });

            const page = await context.newPage();

            try {
              await page.goto(`https://pump.fun/coin/${CA}`, { waitUntil: 'networkidle', timeout: 30000 });
              await page.waitForTimeout(5000);

              console.log('=== Captured API calls ===');
              for (const { url, json } of captured) {
                console.log('URL:', url);
                if (typeof json === 'object' && json !== null) {
                  // Print all keys with numeric values
                  for (const [k, v] of Object.entries(json)) {
                    if (typeof v === 'number' || (typeof v === 'string' && /^\d+\.?\d*$/.test(v))) {
                      console.log(`  ${k}: ${v}`);
                    }
                  }
                }
              }

              // Get all visible text
              const bodyText = await page.evaluate(() => document.body.innerText);
              console.log('=== Page text (first 3000 chars) ===');
              console.log(bodyText.slice(0, 3000));

            } catch (err) {
              console.error('Scrape failed:', err.message);
            } finally {
              await browser.close();
            }
          })();
          EOF
