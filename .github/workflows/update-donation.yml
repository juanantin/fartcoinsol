name: Update Donation Data

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Scrape donate.gg with headless browser
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const CA = 'HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });
            const page = await context.newPage();

            try {
              await page.goto('https://www.donate.gg/charity-coins', {
                waitUntil: 'networkidle',
                timeout: 30000,
              });

              // Wait for the token list to render
              await page.waitForTimeout(3000);

              const title = await page.title();
              const url = page.url();
              console.log('Page title:', title);
              console.log('Page URL:', url);

              const content = await page.content();
              console.log('Content length:', content.length);
              console.log('Content preview:', content.slice(0, 1000));

              let donated = 0;
              let totalRaised = 0;

              const idx = content.indexOf(CA);
              if (idx !== -1) {
                const start = Math.max(0, idx - 2000);
                const slice = content.slice(start, idx + 4000);
                const matches = [...slice.matchAll(/\$([\d,]+\.\d{2})/g)];
                if (matches.length > 0) {
                  const amounts = matches.map(m => parseFloat(m[1].replace(/,/g, '')));
                  donated = Math.max(...amounts);
                }
                console.log(`CA found at index ${idx}, donated: $${donated}`);
              } else {
                console.log('CA not found in page. Trying text extraction...');
                const rows = await page.$$eval('*', els =>
                  els
                    .filter(el => el.textContent && el.textContent.includes('FARTCOIN'))
                    .map(el => el.textContent.trim())
                    .slice(0, 5)
                );
                console.log('FARTCOIN rows:', JSON.stringify(rows));
              }

              const raisedMatch = content.match(/\$([\d,]+\.\d{2})\s*Raised/i);
              if (raisedMatch) {
                totalRaised = parseFloat(raisedMatch[1].replace(/,/g, ''));
              }

              const result = {
                donated,
                totalRaised,
                source: 'donate.gg',
                fetchedAt: new Date().toISOString(),
              };

              fs.writeFileSync('public/donation.json', JSON.stringify(result));
              console.log('Wrote:', result);
            } catch (err) {
              console.error('Scrape failed:', err.message);
              // Keep existing file on failure
              process.exit(0);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/donation.json
          if git diff --cached --quiet; then
            echo "No change in donation data"
          else
            git commit -m "chore: update donation data [skip ci]"
            git push
          fi
