name: Update Donation Data

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Scrape pump.fun for donation data
        run: |
          node - <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const CA = 'HnXDnwTa68tRhLRZdJkVRLAeYrUkCYgFgDavtwD1pump';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              locale: 'en-US',
            });

            let donated = 0;
            let apiData = null;

            // Intercept pump.fun API responses to capture coin data directly
            context.on('response', async (response) => {
              const url = response.url();
              if (url.includes(CA) && url.includes('pump.fun') && response.status() === 200) {
                try {
                  const json = await response.json();
                  console.log('Intercepted API:', url);
                  console.log('API response keys:', Object.keys(json));
                  if (json.donation_usd !== undefined) {
                    donated = json.donation_usd;
                    apiData = json;
                  } else if (json.total_donation_usd !== undefined) {
                    donated = json.total_donation_usd;
                    apiData = json;
                  } else {
                    // Log all numeric fields to find the right one
                    for (const [k, v] of Object.entries(json)) {
                      if (typeof v === 'number' || (typeof v === 'string' && !isNaN(parseFloat(v)))) {
                        console.log(`  field: ${k} = ${v}`);
                      }
                    }
                    apiData = json;
                  }
                } catch {}
              }
            });

            const page = await context.newPage();

            try {
              await page.goto(`https://pump.fun/coin/${CA}`, { waitUntil: 'networkidle', timeout: 30000 });
              await page.waitForTimeout(4000);

              // If API interception didn't find it, parse visible text
              if (donated === 0) {
                const content = await page.content();
                const dollarMatch = content.match(/Donated[\s\S]{0,80}\(\$([\d,]+(?:\.\d{2})?)\)/i);
                if (dollarMatch) {
                  donated = parseFloat(dollarMatch[1].replace(/,/g, ''));
                  console.log('Found via HTML pattern:', donated);
                } else {
                  // Try getting text from visible elements containing "Donated"
                  const texts = await page.$$eval('*', els =>
                    els.filter(el => el.children.length === 0 && el.textContent && el.textContent.includes('Donated'))
                       .map(el => el.textContent.trim())
                       .slice(0, 10)
                  );
                  console.log('Donated text nodes:', JSON.stringify(texts));

                  // Try to extract dollar amount from those texts
                  for (const t of texts) {
                    const m = t.match(/\$\s*([\d,]+(?:\.\d{2})?)/);
                    if (m) {
                      donated = parseFloat(m[1].replace(/,/g, ''));
                      console.log('Extracted from text node:', donated);
                      break;
                    }
                  }
                }
              }

              const result = { donated, totalRaised: donated, source: 'pump.fun', fetchedAt: new Date().toISOString() };
              fs.writeFileSync('public/donation.json', JSON.stringify(result));
              console.log('Wrote:', result);
            } catch (err) {
              console.error('Scrape failed:', err.message);
              process.exit(0);
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/donation.json
          if git diff --cached --quiet; then
            echo "No change in donation data"
          else
            git commit -m "chore: update donation data [skip ci]"
            git push
          fi
